name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  package:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Setup .NET SDK (for WiX)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Normalize release version for installer
        run: |
          $tag = '${{ github.ref_name }}'
          $normalized = $tag.TrimStart('v')
          if ($normalized -match '^\d+\.\d+\.\d+$') {
            $normalized = "$normalized.0"
          }
          if ($normalized -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "Release tag '$tag' is not a valid installer version. Use tags like v1.2.3 or v1.2.3.4."
          }
          "PRODUCT_VERSION=$normalized" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build MSI installer
        run: .\installer\build.ps1 -Configuration Release -Platform x64 -ProductVersion "${{ env.PRODUCT_VERSION }}"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteClip-msi
          path: installer/output/en-US/LiteClip.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteClip-portable
          path: installer/output/portable/LiteClip-portable.zip
          if-no-files-found: error
          retention-days: 30

  release:
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: LiteClip-msi
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: LiteClip-portable
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}