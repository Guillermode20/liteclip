name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --features ffmpeg

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: target/release/liteclip-replay.exe

  package:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: build-output
          path: target/release

      - name: Setup .NET SDK (for WiX)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build MSI installer
        run: |
          cd installer
          ./build.ps1 -Configuration Release -Platform x64 -ProductVersion "${{ github.ref_name }}"
        shell: pwsh

      - name: Prepare portable package
        run: |
          mkdir -p portable/LiteClipReplay-portable
          cp target/release/liteclip-replay.exe portable/LiteClipReplay-portable/
          cp installer/output/portable/LiteClipReplay-portable/*.dll portable/LiteClipReplay-portable/ 2>/dev/null || true
          cd portable
          Compress-Archive -Path LiteClipReplay-portable -DestinationPath LiteClipReplay-portable.zip
        shell: bash

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteClipReplay-msi
          path: installer/output/en-US/LiteClipReplay.msi

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: LiteClipReplay-portable
          path: portable/LiteClipReplay-portable.zip

  release:
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: LiteClipReplay-msi
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: LiteClipReplay-portable
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}