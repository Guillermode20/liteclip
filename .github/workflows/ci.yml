name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  lint:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --features ffmpeg -- -D warnings

  test:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --features ffmpeg --lib

      - name: Run doctests
        run: cargo test --features ffmpeg --doc

      - name: Verify project compiles
        run: cargo check --all-targets --features ffmpeg

  build:
    runs-on: windows-latest
    needs: [lint, test]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --features ffmpeg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: liteclip-replay-exe
          path: target/release/liteclip-replay.exe
          retention-days: 7