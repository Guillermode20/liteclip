name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Run Tests
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Build debug
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose -- --nocapture

      - name: Run doc tests
        run: cargo test --doc --verbose

      - name: Build release
        run: cargo build --release --features ffmpeg --verbose

  test-no-ffmpeg:
    name: Run Tests (no FFmpeg)
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests without FFmpeg feature
        run: cargo test --no-default-features --verbose

  benchmarks:
    name: Run Benchmarks
    runs-on: windows-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run ring buffer benchmarks
        run: cargo bench --package liteclip-core --bench ring_buffer

      - name: Run config benchmarks
        run: cargo bench --package liteclip-core --bench config_serialization

      - name: Run audio mixer benchmarks
        run: cargo bench --package liteclip-core --bench audio_mixer

      - name: Run GUI benchmarks
        run: cargo bench --bench gui_interactions

  check-msrv:
    name: Check MSRV (1.74)
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust 1.74
        uses: dtolnay/rust-toolchain@1.74

      - name: Check compilation without default features
        run: cargo check --no-default-features --verbose
