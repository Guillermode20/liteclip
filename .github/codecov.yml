coverage:
  status:
    project:
      default:
        target: 60%
        threshold: 2%
        informational: false
    patch:
      default:
        target: 75%
        threshold: 5%
  ignore:
    - "benches/"
    - "crates/liteclip-core/benches/"
    - "crates/liteclip-core/examples/"
    - "src/gui/"

comment:
  layout: "diff, flags, files"
  behavior: default
