name: Bug Report
description: Create a report to help us improve LiteClip
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is
      placeholder: When I try to save a clip, the application crashes...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Start the application
        2. Press Ctrl+Shift+S
        3. Observe the crash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen
      placeholder: The clip should be saved to the gallery
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of LiteClip are you running?
      placeholder: "0.2.0"
    validations:
      required: true

  - type: dropdown
    id: windows_version
    attributes:
      label: Windows Version
      description: What version of Windows are you running?
      options:
        - Windows 10
        - Windows 11
        - Other (please specify in Additional Context)
    validations:
      required: true

  - type: dropdown
    id: gpu
    attributes:
      label: GPU
      description: What graphics card are you using?
      options:
        - NVIDIA
        - AMD
        - Intel
        - Other / Multiple
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Please share your configuration file (located at `%APPDATA%\liteclip\config.toml`)
      render: toml

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: If applicable, add logs to help explain your problem (run with `RUST_LOG=debug` for verbose output)
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here
