[package]
name = "liteclip-replay"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = { version = "0.31", default-features = false, features = [
    "default_fonts",
    "glow",
] }
rfd = "0.15"
global-hotkey = "0.6"
chrono = "0.4"
dirs = "6"
tempfile = "3"
log = "0.4"
simplelog = "0.12"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
tray-icon = "0.19"
winreg = "0.55"
image = "0.25"
ctrlc = "3.5.2"

[profile.release]
codegen-units = 1
lto = "fat"
panic = "abort"
strip = true
