[package]
name = "liteclip-recorder"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = { version = "0.31", default-features = false, features = [
    "default_fonts",
    "glow",
] }
rfd = "0.15"
global-hotkey = "0.6"
chrono = "0.4"
dirs = "6"
tempfile = "3"
log = "0.4"
simplelog = "0.12"

[profile.release]
codegen-units = 1
lto = "fat"
panic = "abort"
strip = true
